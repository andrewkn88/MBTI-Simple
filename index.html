function calc(){let raw={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}, answered=0;questions.forEach((q,i)=>{let el=document.querySelector(`input[name=q${i}]:checked`);if(!el)return;answered++;let v=+el.value;if(v>0)raw[q[1]]+=v;if(v<0)raw[q[2]]+=Math.abs(v);});if(answered<questions.length){alert(`아직 답하지 않은 문항이 있습니다. 전체 30개 중 ${answered}개에 답했습니다.`);return}let type=(raw.E>=raw.I?'E':'I')+(raw.S>=raw.N?'S':'N')+(raw.T>=raw.F?'T':'F')+(raw.J>=raw.P?'J':'P'), d=info[type], now=new Date().toLocaleString();let pairs=[['E','I','외향','내향'],['S','N','감각','직관'],['T','F','사고','감정'],['J','P','판단','인식']];let bars=pairs.map(p=>`<div class="barrow"><b>${p[0]} ${p[2]}</b><div><div class="bar"><div class="fill" style="width:${pct(raw[p[0]],raw[p[1]])}%"></div></div><div style="text-align:center;font-size:13px;color:#555">${p[0]}: ${raw[p[0]]}점 / ${p[1]}: ${raw[p[1]]}점</div></div><b>${p[1]} ${p[3]}</b></div>`).join('');window.latestType=type;window.latestResult=`[30문항 MBTI 성격 분석 결과]

진단일: ${now}
나의 MBTI 유형: ${type} - ${d[0]}

■ 유형 설명
${d[1]}

■ 장점
- ${d[2].replaceAll(',', '\n- ')}

■ 단점 또는 주의할 점
- ${d[3].replaceAll(',', '\n- ')}

■ 성장 조언
${d[4]}

■ 잘 맞는 활동 분야
${d[5]}

■ 대표적으로 자주 언급되는 유명인
${d[6]}

■ 점수
E: ${raw.E} / I: ${raw.I}
S: ${raw.S} / N: ${raw.N}
T: ${raw.T} / F: ${raw.F}
J: ${raw.J} / P: ${raw.P}

※ 참고: 간단 자기진단이며 절대적인 성격 판정이 아닙니다.`;let r=document.getElementById('result');r.style.display='block';r.innerHTML=`<div class="title">${type} - ${d[0]}</div><div class="section"><h3>성향 점수</h3>${bars}</div><div class="section"><h3>유형 설명</h3><p>${d[1]}</p></div><div class="section"><h3>장점</h3><ul>${list(d[2])}</ul></div><div class="section"><h3>단점 또는 주의할 점</h3><ul>${list(d[3])}</ul></div><div class="section"><h3>성장 조언</h3><p>${d[4]}</p></div><div class="section"><h3>잘 맞는 활동 분야</h3><p>${d[5]}</p></div><div class="section"><h3>대표적으로 자주 언급되는 유명인</h3><p>${d[6]}</p></div><button type="button" class="primary" onclick="downloadResult()">결과 파일 저장하기</button>`;r.scrollIntoView({behavior:'smooth'})}
function downloadResult(){let blob=new Blob([window.latestResult],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`MBTI_30문항_진단결과_${window.latestType}.txt`;a.click();URL.revokeObjectURL(a.href)}function resetForm(){form.reset();document.getElementById('result').style.display='none';scrollTo({top:0,behavior:'smooth'})}
