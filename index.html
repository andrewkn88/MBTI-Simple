    desc: "현장에서 빠르게 판단하고 움직이는 활동적인 유형입니다. 도전과 경쟁을 즐기며 현실 감각이 뛰어납니다.",
    strengths: ["순발력", "실행력", "현장 대응", "사교성", "위기 대처"],
    weaknesses: ["충동성", "장기 계획 부족", "규칙 무시", "감정 배려 부족", "위험 선호"],
    goodFor: "영업, 스포츠, 창업, 협상, 현장관리",
    famous: "어니스트 헤밍웨이, 마돈나, 도널드 트럼프 등이 자주 ESTP로 언급됩니다."
  },
  ESFP: {
    name: "연예인형",
    desc: "사람들과 함께 즐거움을 만들고 현재를 생생하게 살아가는 유형입니다. 분위기를 밝게 하고 경험을 중시합니다.",
    strengths: ["사교성", "활력", "현장감", "표현력", "낙천성"],
    weaknesses: ["계획 부족", "집중력 부족", "충동 소비", "깊은 고민 회피", "비판에 민감함"],
    goodFor: "공연, 강의, 서비스, 행사, 판매, 커뮤니케이션",
    famous: "마릴린 먼로, 엘비스 프레슬리, 제이미 올리버 등이 자주 ESFP로 언급됩니다."
  }
};

function renderQuestions() {
  const form = document.getElementById("mbtiForm");
  questions.forEach((item, idx) => {
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `
      <strong>${item.q}</strong>
      <label><input type="radio" name="q${idx}" value="${item.a}"> ${item.left}</label>
      <label><input type="radio" name="q${idx}" value="${item.b}"> ${item.right}</label>
    `;
    form.appendChild(div);
  });
}

function calculateMBTI() {
  const scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
  for (let i = 0; i < questions.length; i++) {
    const answer = document.querySelector(`input[name="q${i}"]:checked`);
    if (!answer) {
      alert("모든 질문에 답해주세요.");
      return;
    }
    scores[answer.value]++;
  }

  const type =
    (scores.E >= scores.I ? "E" : "I") +
    (scores.S >= scores.N ? "S" : "N") +
    (scores.T >= scores.F ? "T" : "F") +
    (scores.J >= scores.P ? "J" : "P");

  const info = typeInfo[type];
  const now = new Date().toLocaleString();

  const resultText =
`[간단 MBTI 진단 결과]

진단일: ${now}

나의 MBTI 유형: ${type} - ${info.name}

■ 유형 설명
${info.desc}

■ 장점
- ${info.strengths.join("\n- ")}

■ 단점 또는 주의할 점
- ${info.weaknesses.join("\n- ")}

■ 잘 맞는 활동 분야
${info.goodFor}

■ 대표적으로 자주 언급되는 유명인
${info.famous}

■ 점수
E: ${scores.E} / I: ${scores.I}
S: ${scores.S} / N: ${scores.N}
T: ${scores.T} / F: ${scores.F}
J: ${scores.J} / P: ${scores.P}

※ 참고: 이 결과는 간단 자기진단입니다. 절대적인 성격 판정이 아니라 자기이해와 대화의 출발점으로 활용하세요.`;

  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "block";
  resultDiv.innerHTML = `<div class="type-title">${type} - ${info.name}</div>\n\n${resultText}\n\n<button class="primary" onclick="downloadResult()">결과 파일 저장하기</button>`;
  window.latestResult = resultText;
  window.latestType = type;
  resultDiv.scrollIntoView({ behavior: "smooth" });
}

function downloadResult() {
  const blob = new Blob([window.latestResult], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `MBTI_진단결과_${window.latestType}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function resetForm() {
  document.getElementById("mbtiForm").reset();
  document.getElementById("result").style.display = "none";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

renderQuestions();
</script>
</body>
</html>
